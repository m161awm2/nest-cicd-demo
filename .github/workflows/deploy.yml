  name: Deploy NestJS to EC2

  on:
    push:
      branches:
        - main

  jobs:
    ci:
      name: Continuous Integration
      runs-on: ubuntu-latest

      steps:
        # GitHub Actions 로그에서 어떤 커밋이 빌드되는지 확인할 수 있도록 코드를 체크아웃합니다.
        - name: Checkout repository
          uses: actions/checkout@v4

        # Node.js를 설치합니다.
        - name: Setup Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20

        # 의존성을 설치하고, TypeScript 코드를 빌드하고, 테스트를 실행합니다.
        - name: Install dependencies and run tests
          run: |
            npm ci
            npm run build
            npm test
    # docker를 이용한 배포를 위해 Dockerfile을 빌드하고, Docker Hub에 이미지를 푸시합니다.
    deploy:
      name: Deploy to EC2
      runs-on: ubuntu-latest
      needs: ci

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Build Docker image
          run: |
            docker build -t your-dockerhub-username/nest-cicd-demo:latest .

        - name: Log in to Docker Hub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Push Docker image to Docker Hub
          run: |
            docker push your-dockerhub-username/nest-cicd-demo:latest

        - name: SSH and deploy to EC2
          uses: appleboy/ssh-action@v0.1.6
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              docker pull your-dockerhub-username/nest-cicd-demo:latest
              docker stop nest-cicd-demo || true
              docker rm nest-cicd-demo || true
              docker run -d --name nest-cicd-demo -p 80:3000 your-dockerhub-username/nest-cicd-demo:latest