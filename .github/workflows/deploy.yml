name: Deploy NestJS to EC2

on:
  push:
    branches:
      - main

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      # GitHub Actions 로그에서 어떤 커밋이 빌드되는지 확인할 수 있도록 코드를 체크아웃합니다.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node.js를 설치합니다.
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 의존성을 설치하고, TypeScript 코드를 빌드하고, 테스트를 실행합니다.
      - name: Install dependencies and run tests
        run: |
          npm ci
          npm run build
          npm test
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    steps:
      # GitHub Actions 로그에서 어떤 커밋이 배포되는지 확인할 수 있도록 코드를 체크아웃합니다.
      - name: Checkout repository
        uses: actions/checkout@v4

      # EC2에 SSH로 접속해 배포 명령을 실행합니다.
      - name: Deploy on EC2 with PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -e

            # 프로젝트 폴더로 이동합니다. 최초 1회는 README의 clone 과정을 먼저 실행해야 합니다.
            cd /home/ec2-user/nest-cicd-demo

            # main 브랜치의 최신 코드를 가져옵니다.
            git pull origin main

            # package-lock.json 기준으로 의존성을 재현 가능하게 설치합니다.
            npm ci

            # TypeScript 코드를 dist 폴더로 빌드합니다.
            npm run build

            # 실행 중인 PM2 프로세스가 있으면 재시작하고, 없으면 새로 시작합니다.
            pm2 restart nest-cicd-demo || pm2 start dist/main.js --name nest-cicd-demo

            # 서버 재부팅 후에도 PM2 프로세스 목록을 복원할 수 있게 저장합니다.
            pm2 save
