  name: Deploy NestJS to EC2

  on:
    push:
      branches:
        - main

  jobs:
    ci:
      name: Continuous Integration
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20

        - name: Install dependencies and run tests
          run: |
            npm ci
            npm run build
            npm test
    deploy:
      name: Deploy to EC2
      runs-on: ubuntu-latest
      needs: ci

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Build Docker image
          run: |
            docker build -t m161awm/nest-cicd-demo:latest .

        - name: Log in to Docker Hub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Push Docker image to Docker Hub
          run: |
            docker push m161awm/nest-cicd-demo:latest

        - name: SSH and deploy to EC2
          uses: appleboy/ssh-action@v0.1.6
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              docker pull m161awm/nest-cicd-demo:latest
              docker stop nest-cicd-demo || true
              docker rm nest-cicd-demo || true
              docker run -d --name nest-cicd-demo -p 80:3000 m161awm/nest-cicd-demo:latest